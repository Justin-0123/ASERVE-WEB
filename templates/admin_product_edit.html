{% extends "base.html" %}
{% block title %}Editar producto{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h5 class="mb-0">Editar producto</h5>
        <small class="text-muted">ID: {{ p.id }}</small>
      </div>
      <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin_products') }}">Volver</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="row g-3">

      <div class="col-12 col-md-6">
        <label class="form-label">Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ p.nombre }}" required>
      </div>

      <div class="col-12 col-md-3">
        <label class="form-label">Precio</label>
        <input type="number" step="0.01" min="0" name="precio" class="form-control" value="{{ p.precio }}" required>
      </div>

      <div class="col-12 col-md-3">
        <label class="form-label">Stock</label>
        <input type="number" min="0" name="stock" class="form-control" value="{{ p.stock }}" required>
      </div>

      <div class="col-12 col-md-3">
        <label class="form-label">Stock mínimo</label>
        <input type="number" min="0" name="stock_minimo" class="form-control" value="{{ p.stock_minimo }}">
      </div>

      <div class="col-12 col-md-3 d-flex align-items-end">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="activo" id="activo"
                 {% if p.activo == 1 %}checked{% endif %}>
          <label class="form-check-label" for="activo">Activo</label>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <label class="form-label">Imagen (opcional)</label>
        <input class="form-control" type="file" name="imagen" accept=".png,.jpg,.jpeg,.webp">
        {% if p.image_filename %}
          <div class="mt-2">
            <small class="text-muted d-block mb-1">Actual:</small>
            <img src="{{ url_for('static', filename='uploads/' ~ p.image_filename) }}"
                 style="width:110px;height:110px;object-fit:cover;border-radius:10px;border:1px solid #ddd;"
                 alt="Imagen actual">
          </div>
        {% endif %}
      </div>

      <div class="col-12 d-flex gap-2">
        <button type="submit" class="btn btn-primary btn-sm">Guardar cambios</button>
        <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin_products') }}">Cancelar</a>
      </div>

    </form>

  </div>
</div>
{% endblock %}
