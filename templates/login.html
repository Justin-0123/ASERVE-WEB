{% extends "base.html" %}
{% block title %}Iniciar sesión - ASERVE{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">

    <div class="card shadow-sm">
      <div class="card-body p-4">

        <!-- =====================================================
             ENCABEZADO
             ===================================================== -->
        <div class="text-center mb-4">
          <h4 class="mb-1">Iniciar sesión</h4>
          <small class="text-muted">
            Accedé con tu Código de Colaborador y contraseña.
          </small>
        </div>

        <!-- =====================================================
             FORMULARIO LOGIN
             ===================================================== -->
        <form method="POST" action="{{ url_for('login') }}">

          <!-- Token CSRF -->
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input
              class="form-control"
              type="text"
              name="usuario"
              placeholder="Código de Colaborador"
              required
              autocomplete="username"
              autofocus
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input
              class="form-control"
              type="password"
              name="contrasena"
              placeholder="Ingresá tu contraseña"
              required
              autocomplete="current-password"
            >
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Entrar
          </button>

        </form>

        <!-- =====================================================
             MENSAJE INFORMATIVO
             ===================================================== -->
        <div class="alert alert-light border mt-3 mb-0">
          <small class="text-muted">
            Si olvidaste tu contraseña o tu usuario está bloqueado, solicitá ayuda al administrador.
          </small>
        </div>

      </div>
    </div>

  </div>
</div>
{% endblock %}
