{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">

    <h5 class="mb-1">Cambiar contraseña temporal</h5>
    <p class="text-muted mb-3">
      Hola, <b>{{ user.nombre }}</b>. Por seguridad debes crear una nueva contraseña antes de continuar.
    </p>

    <form method="POST" action="{{ url_for('cambiar_password_temporal') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="row g-3">
        <div class="col-12 col-md-6">
          <label class="form-label">Nueva contraseña</label>
          <input
            class="form-control"
            type="password"
            name="password_nueva"
            required
            minlength="8"
            pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
            title="Debe tener mínimo 8 caracteres, una mayúscula, una minúscula y un número."
            autocomplete="new-password"
          >
          <small class="text-muted">
            Mínimo 8 caracteres, una mayúscula, una minúscula y un número.
          </small>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">Confirmar nueva contraseña</label>
          <input
            class="form-control"
            type="password"
            name="password_confirmar"
            required
            minlength="8"
            autocomplete="new-password"
          >
        </div>
      </div>

      <button class="btn btn-success mt-3" type="submit">
        Guardar nueva contraseña
      </button>
    </form>

  </div>
</div>
{% endblock %}
